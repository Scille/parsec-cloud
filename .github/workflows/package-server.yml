name: package-server

on:
  workflow_call:
    inputs:
      version:
        description: The version to use
        type: string
        required: true
      version_patch_run_id:
        description: |
          The run id where the version.patch artifact was uploaded.
          If not provided, the workflow will generate the patch by itself.
        type: string
        required: true
      commit_sha:
        required: true
        type: string
        description: The commit SHA to use when checkout'ing the repository
        default: ${{ github.sha }}
  # PS: If you trigger manually the packaging, take into account that it will use the workflow as defined in the main branch not in the target branch.
  workflow_dispatch:
    inputs:
      version:
        description: The version to use (if not provided will generated one from the code space version)
        type: string
        required: false
  pull_request:
    paths:
      - .github/workflows/package-server.yml
      - server/packaging
      - server/pyproject.toml

# We set `concurrency` to prevent having this workflow being run on code that is not up-to-date on a PR (a user make multiple push in a quick manner).
# But on the main branch, we don't want that behavior.
# Having the workflow run on each merge commit is something we would like, that could help us where a regression was made and missed by previous checks.
#
# For that we use `head_ref` that is only defined on `pull-request` and fallback to `run_id` (this is a counter, so it's value is unique between workflow call).
concurrency:
  group: package-server-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  version:
    if: ${{ inputs.version_patch_run_id == '' }}
    uses: ./.github/workflows/_parse_version.yml
    with:
      version: ${{ inputs.version }}
      commit_sha: ${{ inputs.commit_sha }}

  package-wheel:
    needs: version
    # Always run the job if `version` job is skipped otherwise only if `version` job was successful.
    if: ${{ inputs.version_patch_run_id != '' && always() || success() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 🐧 Linux
            platform: linux-gnu
            os: ubuntu-22.04
          - name: 🍎 macOS
            platform: macos
            os: macos-15
          - name: 🏁 Windows
            platform: windows
            os: windows-2025
    name: "${{ matrix.name }}: 📦 Packaging (build Wheel)"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin v7.0.0
        with:
          ref: ${{ inputs.commit_sha }}
        timeout-minutes: 5

      - name: Download version.patch artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin v8.0.1
        with:
          name: version.patch
          digest-mismatch: error
          path: ${{ runner.temp }}/version.patch
          run-id: ${{ inputs.version_patch_run_id || github.run_id }}

      - name: Apply version.patch
        run: git apply --allow-empty ${{ runner.temp }}/version.patch/version.patch

      - name: Windows > Install yq
        if: matrix.platform == 'windows'
        run: choco install yq
        timeout-minutes: 3

      # Building OpenSSL requires a perl interpreter.
      # The default one does not provide windows-style filesystem
      # paths so we have to switch to Strawberry.
      - name: Set Perl environment variables
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          echo OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl >> $GITHUB_ENV
          echo PERL=C:/Strawberry/perl/bin/perl >> $GITHUB_ENV
        timeout-minutes: 1

      - name: Get rust flag release
        shell: bash
        run: |
          echo "MATURIN_PEP517_ARGS=$(python make.py --quiet python-release-libparsec-cargo-flags) --locked" >> $GITHUB_ENV
        env:
          LIBPARSEC_FORCE_VENDORED_OPENSSL: true
        timeout-minutes: 1

      - name: Build wheel
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # pin v4.1.0
        with:
          package-dir: server
          output-dir: dist
        env:
          MATURIN_PEP517_ARGS: ${{ env.MATURIN_PEP517_ARGS }}
        timeout-minutes: 50

      - name: Set file for wheel version
        run: cp -v libparsec/version dist/version

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: server
          version: 0.11.29 # marker:uv-version
        timeout-minutes: 5

      - run: git status --porcelain

      - name: Generate requirements & constraints infos
        run: python server/packaging/wheel/wheel_it.py ./server --output dist --skip-wheel

      - name: Generate artifacts.yml file
        shell: bash -eux -o pipefail {0}
        run: |
          yq --null-input ".${{ matrix.platform }}.$(uname -m).server = \"$(cd dist; ls *.whl | head -n 1)\"" | tee dist/artifacts.yml

      # Install syft
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # pin v2.82.9
        with:
          tool: syft@0.84.0

      - name: Generate SBOM
        run: syft packages --config=.syft.yaml --output=spdx-json=dist/Parsec-SBOM-Wheel-${{ matrix.platform }}.spdx.json .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin v7.0.1
        with:
          name: ${{ runner.os }}-${{ runner.arch }}-wheel
          path: |
            dist/
          if-no-files-found: error
        timeout-minutes: 5
