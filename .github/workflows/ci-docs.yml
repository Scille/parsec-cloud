name: CI Docs

on:
  workflow_call:
  workflow_dispatch:

# We set `concurrency` to prevent having this workflow being run on code that is not up-to-date on a PR (a user make multiple push in a quick manner).
# But on the main branch, we don't want that behavior.
# Having the workflow run on each merge commit is something we would like, that could help us where a regression was made and missed by previous checks.
#
# For that we use `head_ref` that is only defined on `pull-request` and fallback to `run_id` (this is a counter, so it's value is unique between workflow call).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  # Convert sphinx warning into errors.
  SPHINXOPTS: --fail-on-warning --verbose

permissions:
  contents: read

jobs:
  docs:
    name: Build & Check documentations
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin v7.0.0
        with:
          sparse-checkout: |
            .github
            HISTORY.rst
            docs
        timeout-minutes: 2

      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # pin v2.82.9
        with:
          tool: ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        timeout-minutes: 5

      - name: Install gettext (required by powrap)
        run: |
          sudo apt-get install -y gettext
          gettext --version
        timeout-minutes: 5

      - name: Install docs deps
        run: |
          uv sync
        timeout-minutes: 5

      - name: Update translation
        run: uv run make --environment-overrides intl-fr
        timeout-minutes: 2

      - name: Wrap `*.po` files
        run: uv run make --environment-overrides wrap
        timeout-minutes: 1

      - name: No fuzzy translation
        run: |
          ! rg '#, fuzzy' locale/
        timeout-minutes: 1

      - name: Check if `*.po` were modified
        shell: bash
        run: |
          if [ -n "$(git status --porcelain '*.po' | tee /dev/stderr)" ]; then
            # PO files were modified, the step fail
            exit 1
          else
            # NO PO files were modified, the step succeed
            exit 0
          fi

      - name: Lint docs with sphinx-lint
        run: uv run make --environment-overrides lint

      - name: Build html documentation
        run: uv run make --environment-overrides html
        timeout-minutes: 2
